title: "AI Infrastructure & GPU Engineering Ramp"
description: "A 12-week NVIDIA Kubernetes-AI curriculum combining certification prep, GPU engineering projects, C++/CUDA drills, and a portfolio-ready demo path."
theme: jekyll-theme-cayman

# Rewrites links between .md files to their rendered .html pages
plugins:
  - jekyll-relative-links
relative_links:
  enabled: true
  collections: true

# Render every markdown file, even without front matter
defaults:
  - scope:
      path: ""
    values:
      layout: default

include:
  - MASTER-PLAN.md

exclude:
  - k8s-ai-stack-demo.zip
  - claude_code_prompt_cert_plan.md
  - Gemfile
  - Gemfile.lock

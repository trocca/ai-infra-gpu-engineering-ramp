name: Refresh README stats

on:
  push:
    branches: [main]
    paths-ignore:
      - "stats/traffic-history.json"   # belt-and-braces; bot pushes don't retrigger anyway
  schedule:
    - cron: "17 6 * * *"   # daily 06:17 UTC — traffic API only retains 14 days, don't lose data
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh README dashboard + tech table
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional: classic PAT with `repo` scope. GitHub's traffic endpoints
          # (/traffic/views, /traffic/clones) reject the default GITHUB_TOKEN,
          # so views/clones only populate once this secret exists:
          #   Settings → Secrets and variables → Actions → New secret: TRAFFIC_TOKEN
          TRAFFIC_TOKEN: ${{ secrets.TRAFFIC_TOKEN }}
        run: python scripts/refresh_readme.py

      - name: Commit refreshed stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md stats/traffic-history.json
          if git diff --cached --quiet; then
            echo "Nothing changed — skipping commit."
          else
            git commit -m "chore: refresh README stats [bot]"
            git push
          fi

# SCENE 6b — MULTI-NODE inference with LeaderWorkerSet: the model sharded
# across nodes, deployed/scaled/restarted as ONE unit.
#
# Pattern (from the upstream LWS vLLM example): the leader runs the Ray head
# + the vLLM OpenAI server; workers join as Ray workers holding model shards.
# LWS injects LWS_LEADER_ADDRESS / LWS_GROUP_SIZE / LWS_WORKER_INDEX and
# creates a headless Service + StatefulSet per group — the inference analog
# of the training operator's MASTER_ADDR/RANK injection.
#
# NOTE ▸ Cross-check against the maintained example before running:
# github.com/kubernetes-sigs/lws  → docs/examples/vllm
# (Ray bootstrap scripts and image tags evolve; the CRD shape below is stable.)
---
apiVersion: leaderworkerset.x-k8s.io/v1
kind: LeaderWorkerSet
metadata:
  name: vllm-multinode
spec:
  replicas: 1               # number of model GROUPS (each = leader + workers)
  leaderWorkerTemplate:
    size: 2                 # pods per group: 1 leader + 1 worker
    restartPolicy: RecreateGroupOnPodRestart   # all-or-nothing, like a gang
    leaderTemplate:
      metadata:
        labels: { role: leader }
      spec:
        containers:
          - name: vllm-leader
            image: vllm/vllm-openai:latest
            command:
              - bash
              - -c
              # Start Ray head, wait for the full group, then serve with
              # the model sharded across ALL GPUs in the group:
              # tensor-parallel across the whole leader+worker set.
              - |
                ray start --head --port=6379 --disable-usage-stats
                until [ "$(ray status 2>/dev/null | grep -c node_)" -ge "$LWS_GROUP_SIZE" ]; do
                  echo waiting for $LWS_GROUP_SIZE ray nodes; sleep 5
                done
                python3 -m vllm.entrypoints.openai.api_server \
                  --model Qwen/Qwen2.5-7B-Instruct \
                  --tensor-parallel-size 2 \
                  --port 8000
            ports:
              - containerPort: 8000
            resources:
              limits: { nvidia.com/gpu: 1 }
    workerTemplate:
      metadata:
        labels: { role: worker }
      spec:
        containers:
          - name: vllm-worker
            image: vllm/vllm-openai:latest
            command:
              - bash
              - -c
              # LWS_LEADER_ADDRESS = stable DNS of the leader via the
              # headless Service — the rendezvous point, injected for us.
              - |
                ray start --address=$LWS_LEADER_ADDRESS:6379 --block
            resources:
              limits: { nvidia.com/gpu: 1 }
---
# Expose the LEADER's API (LWS labels the leader pods for exactly this).
apiVersion: v1
kind: Service
metadata:
  name: vllm-multinode
spec:
  selector:
    leaderworkerset.sigs.k8s.io/name: vllm-multinode
    role: leader
  ports:
    - port: 8000
      targetPort: 8000
